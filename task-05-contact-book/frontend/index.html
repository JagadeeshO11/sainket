<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Book</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="container">
    <h1>📒 Contact Book</h1>

    <div class="top-panel">
      <div class="card add-form">
        <h2>Add Contact</h2>
        <input type="text"  id="name"  placeholder="Full Name" />
        <input type="tel"   id="phone" placeholder="Phone Number" />
        <input type="email" id="email" placeholder="Email Address" />
        <button id="addBtn">Add Contact</button>
        <div id="formError" class="error hidden"></div>
      </div>

      <div class="card search-box">
        <h2>Search Contacts</h2>
        <input type="text" id="searchInput" placeholder="Search by name..." />
        <div id="searchCount" class="search-count hidden"></div>
      </div>
    </div>

    <section class="card contacts-section">
      <h2>All Contacts <span id="contactCount" class="count"></span></h2>
      <div id="loader" class="loader hidden">Loading...</div>
      <div id="contactsList"></div>
      <p id="emptyMsg" class="empty-msg hidden">No contacts found.</p>
    </section>
  </div>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
