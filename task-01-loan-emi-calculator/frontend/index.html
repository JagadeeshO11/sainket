<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loan EMI Calculator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <h1>💰 Loan EMI Calculator</h1>
    <div class="card">
      <div class="form-group">
        <label>Principal Amount (₹)</label>
        <input type="number" id="principal" placeholder="e.g. 500000" />
      </div>
      <div class="form-group">
        <label>Annual Interest Rate (%)</label>
        <input type="number" id="rate" placeholder="e.g. 8.5" step="0.1" />
      </div>
      <div class="form-group">
        <label>Loan Tenure (Months)</label>
        <input type="number" id="tenure" placeholder="e.g. 60" />
      </div>
      <button id="calculateBtn">Calculate EMI</button>
      <div id="errorMsg" class="error hidden"></div>
      <div id="result" class="result hidden">
        <div class="result-row">
          <span>Monthly EMI</span>
          <strong id="emiValue"></strong>
        </div>
        <div class="result-row">
          <span>Total Payment</span>
          <strong id="totalPayment"></strong>
        </div>
        <div class="result-row">
          <span>Total Interest</span>
          <strong id="totalInterest"></strong>
        </div>
      </div>
    </div>
  </div>
  <script src="js/emi.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
